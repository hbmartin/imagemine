[project]
name = "imagemine"
version = "0.1.0"
description = "Add your description here"
readme = "README.md"
requires-python = ">=3.14"
dependencies = [
    "anthropic>=0.84.0",
    "gemimg>=0.4.0",
    "pillow>=12.1.1",
]

[project.scripts]
imagemine = "imagemine.cli:main"

[dependency-groups]
dev = [
    "black>=25.9.0",
    "pytest>=8.4.2",
    "ruff>=0.14.3",
    "ty>=0.0.1a25",
]

[tool.pytest.ini_options]
pythonpath = ["."]
